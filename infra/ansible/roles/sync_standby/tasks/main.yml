---
- name: Stop PostgreSQL on sync standby
  service:
    name: "{{ postgres_service }}"
    state: stopped
  ignore_errors: yes

- name: Reset failed systemd unit
  shell: systemctl reset-failed postgresql@{{ postgres_version }}-main || true

- name: Drop existing cluster on sync standby
  shell: pg_dropcluster --stop {{ postgres_version }} main || true

- name: Remove data directory
  file:
    path: "{{ postgres_data_dir }}"
    state: absent

- name: Create empty data directory
  file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'

- name: Run pg_basebackup from primary
  become_user: postgres
  shell: |
    pg_basebackup \
      -h {{ hostvars[groups['primary'][0]]['ansible_host'] }} \
      -D {{ postgres_data_dir }} \
      -U {{ replication_user }} \
      -P \
      -R \
      --wal-method=stream \
      --slot=sync_standby_slot
  environment:
    PGPASSWORD: "{{ replication_password }}"
  register: basebackup_result
  failed_when: basebackup_result.rc != 0

- name: Set application_name for sync standby
  lineinfile:
    path: "{{ postgres_data_dir }}/postgresql.auto.conf"
    line: "application_name = 'sync_standby_az_b'"
    state: present

- name: Recreate cluster config using existing data directory
  shell: pg_createcluster {{ postgres_version }} main --datadir {{ postgres_data_dir }} || true

- name: Set correct ownership on data directory
  file:
    path: "{{ postgres_data_dir }}"
    owner: postgres
    group: postgres
    recurse: yes

- name: Set correct ownership on config directory
  file:
    path: /etc/postgresql/{{ postgres_version }}/main
    owner: postgres
    group: postgres
    recurse: yes

- name: Reset failed systemd unit before start
  shell: systemctl reset-failed postgresql@{{ postgres_version }}-main || true

- name: Start PostgreSQL on sync standby
  service:
    name: "{{ postgres_service }}"
    state: started
    enabled: yes

- name: Wait for sync standby to be ready
  become_user: postgres
  shell: pg_isready -p {{ postgres_port }}
  register: pg_ready
  retries: 10
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Verify sync standby is in recovery mode
  become_user: postgres
  shell: psql -X -d postgres -c "SELECT pg_is_in_recovery();"
  register: recovery_check
  failed_when: "'t' not in recovery_check.stdout"
  changed_when: false

- name: Show recovery status
  debug:
    msg: "{{ recovery_check.stdout }}"
