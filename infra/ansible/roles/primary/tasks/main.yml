---
- name: Check if PostgreSQL cluster is initialized
  stat:
    path: "{{ postgres_data_dir }}/PG_VERSION"
  register: pg_initialized

- name: Drop broken cluster
  shell: pg_dropcluster --stop {{ postgres_version }} main || true
  when: not pg_initialized.stat.exists

- name: Create fresh PostgreSQL cluster
  shell: pg_createcluster {{ postgres_version }} main
  when: not pg_initialized.stat.exists

- name: Ensure PostgreSQL cluster is started
  service:
    name: "{{ postgres_service }}"
    state: started
    enabled: yes

- name: Wait for PostgreSQL to be ready
  become_user: postgres
  shell: pg_isready -h /var/run/postgresql -p {{ postgres_port }}
  register: pg_ready
  retries: 10
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Deploy postgresql.conf
  template:
    src: postgresql.conf.j2
    dest: "{{ postgres_conf_dir }}/postgresql.conf"
    owner: postgres
    group: postgres
    mode: '0644'

- name: Verify postgresql.conf data_directory line
  shell: grep data_directory {{ postgres_conf_dir }}/postgresql.conf
  register: conf_check
  changed_when: false

- name: Print data_directory value
  debug:
    var: conf_check.stdout

- name: Deploy pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: "{{ postgres_conf_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: '0640'

- name: Restart PostgreSQL
  shell: |
    systemctl kill -s SIGQUIT postgresql@{{ postgres_version }}-main || true
    sleep 2
    systemctl start postgresql@{{ postgres_version }}-main
  register: restart_result
  ignore_errors: yes

- name: Show restart result
  debug:
    var: restart_result

- name: Show PostgreSQL journal
  shell: journalctl -xeu postgresql@{{ postgres_version }}-main --no-pager -n 100
  register: pg_journal
  changed_when: false
  ignore_errors: yes

- name: Print PostgreSQL journal
  debug:
    var: pg_journal.stdout_lines

- name: Show PostgreSQL log
  shell: tail -100 /var/log/postgresql/postgresql-{{ postgres_version }}-main.log
  register: pg_log
  changed_when: false
  ignore_errors: yes

- name: Print PostgreSQL log
  debug:
    var: pg_log.stdout_lines

- name: Wait for PostgreSQL to be ready after restart
  become_user: postgres
  shell: pg_isready -h /var/run/postgresql -p {{ postgres_port }}
  register: pg_ready_after
  retries: 15
  delay: 5
  until: pg_ready_after.rc == 0
  changed_when: false
  ignore_errors: yes

- name: Create replication user
  become_user: postgres
  shell: |
    psql -c "
    DO \$\$
    BEGIN
      IF NOT EXISTS (
        SELECT FROM pg_roles WHERE rolname = '{{ replication_user }}'
      ) THEN
        CREATE ROLE {{ replication_user }}
        WITH REPLICATION LOGIN
        PASSWORD '{{ replication_password }}';
      END IF;
    END
    \$\$;"
  changed_when: false
  ignore_errors: yes

- name: Create replication slot for sync standby
  become_user: postgres
  shell: |
    psql -c "
    SELECT pg_create_physical_replication_slot('sync_standby_slot')
    WHERE NOT EXISTS (
      SELECT 1 FROM pg_replication_slots
      WHERE slot_name = 'sync_standby_slot'
    );"
  changed_when: false
  ignore_errors: yes

- name: Create replication slot for async standby
  become_user: postgres
  shell: |
    psql -c "
    SELECT pg_create_physical_replication_slot('async_standby_slot')
    WHERE NOT EXISTS (
      SELECT 1 FROM pg_replication_slots
      WHERE slot_name = 'async_standby_slot'
    );"
  changed_when: false
  ignore_errors: yes

- name: Verify primary is accepting connections
  become_user: postgres
  shell: psql -c "SELECT version();"
  register: pg_version
  changed_when: false
  ignore_errors: yes

- name: Show PostgreSQL version
  debug:
    var: pg_version.stdout
