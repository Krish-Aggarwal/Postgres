---
- name: Install prerequisite packages
  apt:
    name:
      - curl
      - gnupg
      - lsb-release
      - ca-certificates
      - python3-pip
      - awscli
    state: present
    update_cache: yes

- name: Add PostgreSQL apt signing key
  apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL apt repository
  apt_repository:
    repo: "deb http://apt.postgresql.org/pub/repos/apt \
           {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install PostgreSQL {{ postgres_version }}
  apt:
    name:
      - postgresql-{{ postgres_version }}
      - postgresql-client-{{ postgres_version }}
      - postgresql-contrib
    state: present
    update_cache: yes

- name: Check if PostgreSQL cluster is initialized
  stat:
    path: "{{ postgres_data_dir }}/PG_VERSION"
  register: pg_initialized

- name: Initialize PostgreSQL cluster if not already done
  shell: |
    pg_dropcluster --stop {{ postgres_version }} main || true
    pg_createcluster {{ postgres_version }} main
  when: not pg_initialized.stat.exists

- name: Ensure PostgreSQL is started and enabled
  service:
    name: postgresql
    state: started
    enabled: yes

- name: Wait for PostgreSQL to be ready
  become_user: postgres
  shell: pg_isready -p {{ postgres_port }}
  register: pg_ready
  retries: 10
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Set interpreter discovery warning fix
  ini_file:
    path: /etc/ansible/ansible.cfg
    section: defaults
    option: interpreter_python
    value: /usr/bin/python3
  ignore_errors: yes
