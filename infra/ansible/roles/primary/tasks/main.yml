---
- name: Check if PostgreSQL cluster is initialized
  stat:
    path: "{{ postgres_data_dir }}/PG_VERSION"
  register: pg_initialized

- name: Drop broken cluster
  shell: pg_dropcluster --stop {{ postgres_version }} main || true
  when: not pg_initialized.stat.exists

- name: Create fresh PostgreSQL cluster
  shell: pg_createcluster {{ postgres_version }} main
  when: not pg_initialized.stat.exists

- name: Ensure PostgreSQL is started after cluster creation
  service:
    name: postgresql
    state: started
    enabled: yes

- name: Wait for PostgreSQL to be ready
  become_user: postgres
  shell: pg_isready -p {{ postgres_port }}
  register: pg_ready
  retries: 10
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Deploy postgresql.conf
  template:
    src: postgresql.conf.j2
    dest: "{{ postgres_conf_dir }}/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0644"
  notify: Restart PostgreSQL

- name: Deploy pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: "{{ postgres_conf_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart PostgreSQL

- name: Flush handlers
  meta: flush_handlers

- name: Wait 5 seconds after restart
  pause:
    seconds: 5

- name: Check PostgreSQL status
  command: systemctl status postgresql --no-pager
  register: pg_status
  ignore_errors: yes
  changed_when: false

- name: Show PostgreSQL status
  debug:
    var: pg_status.stdout_lines

- name: Show PostgreSQL journal
  command: journalctl -u postgresql -n 100 --no-pager
  register: pg_journal
  ignore_errors: yes
  changed_when: false

- name: Display PostgreSQL journal
  debug:
    var: pg_journal.stdout_lines

- name: Show PostgreSQL log
  shell: |
    if [ -f /var/log/postgresql/postgresql-{{ postgres_version }}-main.log ]; then
      tail -100 /var/log/postgresql/postgresql-{{ postgres_version }}-main.log
    else
      echo "PostgreSQL log file not found"
    fi
  register: pg_log
  ignore_errors: yes
  changed_when: false

- name: Display PostgreSQL log
  debug:
    var: pg_log.stdout_lines

- name: Wait for PostgreSQL to be ready after restart
  become_user: postgres
  shell: pg_isready -p {{ postgres_port }}
  register: pg_ready_after
  retries: 10
  delay: 3
  until: pg_ready_after.rc == 0
  changed_when: false

- name: Create replication user
  become_user: postgres
  shell: |
    psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ replication_user }}'" | grep -q 1 || \
    psql -c "CREATE ROLE {{ replication_user }} WITH REPLICATION LOGIN PASSWORD '{{ replication_password }}';"
  changed_when: false

- name: Create sync replication slot
  become_user: postgres
  shell: |
    psql -tc "SELECT 1 FROM pg_replication_slots WHERE slot_name='sync_standby_slot'" | grep -q 1 || \
    psql -c "SELECT pg_create_physical_replication_slot('sync_standby_slot');"
  changed_when: false

- name: Create async replication slot
  become_user: postgres
  shell: |
    psql -tc "SELECT 1 FROM pg_replication_slots WHERE slot_name='async_standby_slot'" | grep -q 1 || \
    psql -c "SELECT pg_create_physical_replication_slot('async_standby_slot');"
  changed_when: false

- name: Verify PostgreSQL
  become_user: postgres
  shell: psql -c "SELECT version();"
  register: pg_version_out
  changed_when: false

- name: Show PostgreSQL version
  debug:
    var: pg_version_out.stdout_lines
