---
- name: Install prerequisite packages
  apt:
    name:
      - curl
      - gnupg
      - lsb-release
      - ca-certificates
      - python3-pip
      - awscli
    state: present
    update_cache: yes

- name: Add PostgreSQL apt signing key
  apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL apt repository
  apt_repository:
    repo: "deb http://apt.postgresql.org/pub/repos/apt \
           {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install PostgreSQL {{ postgres_version }}
  apt:
    name:
      - postgresql-{{ postgres_version }}
      - postgresql-client-{{ postgres_version }}
      - postgresql-contrib
    state: present
    update_cache: yes

- name: Check if PostgreSQL cluster is initialized
  stat:
    path: "{{ postgres_data_dir }}/PG_VERSION"
  register: pg_initialized

- name: Drop broken cluster if not initialized
  shell: pg_dropcluster --stop {{ postgres_version }} main || true
  when: not pg_initialized.stat.exists

- name: Create fresh PostgreSQL cluster
  shell: pg_createcluster {{ postgres_version }} main
  when: not pg_initialized.stat.exists

- name: Ensure PostgreSQL cluster is started and enabled
  service:
    name: "postgresql@{{ postgres_version }}-main"
    state: started
    enabled: yes

- name: Wait for PostgreSQL to be ready
  become_user: postgres
  shell: pg_isready -h /var/run/postgresql -p {{ postgres_port }}
  register: pg_ready
  retries: 10
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false
