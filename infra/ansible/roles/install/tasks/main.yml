---
- name: Install prerequisite packages
  apt:
    name:
      - curl
      - gnupg
      - lsb-release
      - ca-certificates
      - python3-pip
      - awscli
    state: present
    update_cache: yes

- name: Add PostgreSQL signing key
  apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL repo
  apt_repository:
    repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install PostgreSQL packages
  apt:
    name:
      - postgresql-{{ postgres_version }}
      - postgresql-client-{{ postgres_version }}
      - postgresql-contrib
    state: present
    update_cache: yes

- name: Ensure PostgreSQL service is stopped (safe for HA setup)
  service:
    name: "{{ postgres_service }}"
    state: stopped
  ignore_errors: yes

- name: Reset systemd failures
  shell: systemctl reset-failed postgresql@{{ postgres_version }}-main || true

- name: Show cluster status
  shell: pg_lsclusters
  register: cluster_status
  changed_when: false

- name: Debug cluster status
  debug:
    var: cluster_status.stdout_lines

- name: Enable PostgreSQL service
  systemd:
    name: "{{ postgres_service }}"
    enabled: yes

- name: Wait for PostgreSQL (if already running)
  become_user: postgres
  shell: pg_isready -p {{ postgres_port }}
  register: pg_ready
  retries: 10
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false
  ignore_errors: yes
