---
- name: Stop PostgreSQL on sync standby
  service:
    name: "{{ postgres_service }}"
    state: stopped
  ignore_errors: yes

- name: Reset failed systemd unit
  shell: systemctl reset-failed postgresql@{{ postgres_version }}-main || true
  changed_when: false

- name: Ensure PostgreSQL data directory exists
  file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Clean PostgreSQL data directory
  shell: find {{ postgres_data_dir }} -mindepth 1 -delete
  changed_when: true

- name: Run base backup from primary
  become: yes
  become_user: postgres
  shell: |
    pg_basebackup \
      -h {{ hostvars[groups['primary'][0]]['ansible_host'] }} \
      -D {{ postgres_data_dir }} \
      -U {{ replication_user }} \
      -P \
      -R \
      --wal-method=stream \
      --slot=sync_standby_slot
  environment:
    PGPASSWORD: "{{ replication_password }}"
  register: basebackup
  failed_when: basebackup.rc != 0

- name: Fix ownership of PostgreSQL data directory
  file:
    path: "{{ postgres_data_dir }}"
    owner: postgres
    group: postgres
    recurse: yes

- name: Reset failed systemd unit again
  shell: systemctl reset-failed postgresql@{{ postgres_version }}-main || true
  changed_when: false

- name: Start PostgreSQL standby
  service:
    name: "{{ postgres_service }}"
    state: started
    enabled: yes

- name: Wait for PostgreSQL to accept connections
  become: yes
  become_user: postgres
  shell: pg_isready -p {{ postgres_port }}
  register: pg_ready
  retries: 20
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Verify standby is in recovery mode
  become: yes
  become_user: postgres
  shell: psql -tAc "SELECT pg_is_in_recovery();"
  register: recovery
  failed_when: recovery.stdout.strip() != "t"
  changed_when: false

- name: Display standby status
  debug:
    msg: "Sync standby is running in recovery mode: {{ recovery.stdout.strip() }}"
