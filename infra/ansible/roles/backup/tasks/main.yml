- name: Create backup directory
  file:
    path: "{{ backup_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0750'

- name: Ensure AWS CLI is installed
  apt:
    name: awscli
    state: present
    update_cache: yes

- name: Deploy backup script
  template:
    src: backup.sh.j2
    dest: /usr/local/bin/postgres_backup.sh
    owner: root
    group: root
    mode: '0755'

- name: Create log file for backup
  copy:
    content: ""
    dest: /var/log/pg_backup.log
    owner: postgres
    group: postgres
    mode: '0644'
    force: no

- name: Create cron job - daily backup at 2am UTC
  cron:
    name: "PostgreSQL daily S3 backup"
    minute: "0"
    hour: "2"
    user: postgres
    job: "flock -n /tmp/pg_backup.lock /usr/local/bin/postgres_backup.sh >> /var/log/pg_backup.log 2>&1"
    state: present
