---
- name: Stop PostgreSQL on sync standby
  service:
    name: "{{ postgres_service }}"
    state: stopped
  ignore_errors: yes

- name: Reset failed systemd unit
  shell: systemctl reset-failed postgresql@{{ postgres_version }}-main || true

- name: Drop existing PostgreSQL cluster
  shell: pg_dropcluster --stop {{ postgres_version }} main || true

- name: Create fresh PostgreSQL cluster
  shell: pg_createcluster {{ postgres_version }} main

- name: Stop newly created cluster
  service:
    name: "{{ postgres_service }}"
    state: stopped

- name: Remove initialized data directory
  file:
    path: "{{ postgres_data_dir }}"
    state: absent

- name: Recreate empty data directory
  file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Take base backup from primary
  become_user: postgres
  shell: |
    pg_basebackup \
      -h {{ hostvars[groups['primary'][0]]['ansible_host'] }} \
      -D {{ postgres_data_dir }} \
      -U {{ replication_user }} \
      -P \
      -R \
      --wal-method=stream \
      --slot=sync_standby_slot
  environment:
    PGPASSWORD: "{{ replication_password }}"
  register: basebackup
  failed_when: basebackup.rc != 0

- name: Set standby application_name
  lineinfile:
    path: "{{ postgres_data_dir }}/postgresql.auto.conf"
    regexp: '^application_name'
    line: "application_name = 'sync_standby_az_b'"

- name: Ensure postgres owns data directory
  file:
    path: "{{ postgres_data_dir }}"
    owner: postgres
    group: postgres
    recurse: yes

- name: Ensure config directory ownership
  file:
    path: "/etc/postgresql/{{ postgres_version }}/main"
    owner: root
    group: postgres
    recurse: yes

- name: Reset failed unit
  shell: systemctl reset-failed postgresql@{{ postgres_version }}-main || true

- name: Start PostgreSQL
  service:
    name: "{{ postgres_service }}"
    state: started
    enabled: yes

- name: Wait until PostgreSQL is accepting connections
  become_user: postgres
  shell: pg_isready -p {{ postgres_port }}
  register: pg_ready
  retries: 20
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Verify standby is in recovery
  become_user: postgres
  shell: psql -tAc "SELECT pg_is_in_recovery();"
  register: recovery

- debug:
    msg: "{{ recovery.stdout }}"
