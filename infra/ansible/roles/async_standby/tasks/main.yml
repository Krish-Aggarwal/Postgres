- name: Stop PostgreSQL
  service:
    name: postgresql
    state: stopped
  ignore_errors: yes

- name: Clean data directory
  file:
    path: "{{ postgres_data_dir }}"
    state: absent

- name: Recreate data directory
  file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Run basebackup from primary
  become_user: postgres
  shell: |
    pg_basebackup \
      -h {{ hostvars[groups['primary'][0]]['ansible_host'] }} \
      -D {{ postgres_data_dir }} \
      -U {{ replication_user }} \
      -P \
      -R \
      --wal-method=stream \
      --slot=async_standby_slot
  environment:
    PGPASSWORD: "{{ replication_password }}"

- name: Create standby.signal
  file:
    path: "{{ postgres_data_dir }}/standby.signal"
    state: touch
    owner: postgres
    group: postgres

- name: Fix ownership
  file:
    path: "{{ postgres_data_dir }}"
    owner: postgres
    group: postgres
    recurse: yes

- name: Start PostgreSQL
  service:
    name: postgresql@{{ postgres_version }}-main
    state: started
    enabled: yes
