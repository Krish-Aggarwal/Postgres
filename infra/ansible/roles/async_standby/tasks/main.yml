---
- name: Stop PostgreSQL on async standby
  service:
    name: postgresql
    state: stopped

- name: Check if data directory exists
  stat:
    path: "{{ postgres_data_dir }}/PG_VERSION"
  register: standby_initialized

- name: Drop existing cluster on async standby
  shell: pg_dropcluster --stop {{ postgres_version }} main || true
  when: standby_initialized.stat.exists

- name: Remove data directory
  file:
    path: "{{ postgres_data_dir }}"
    state: absent

- name: Create empty data directory
  file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'

- name: Run pg_basebackup from primary
  become_user: postgres
  shell: |
    pg_basebackup \
      -h {{ hostvars[groups['primary'][0]]['ansible_host'] }} \
      -D {{ postgres_data_dir }} \
      -U {{ replication_user }} \
      -P \
      -R \
      --wal-method=stream \
      --slot=async_standby_slot
  environment:
    PGPASSWORD: "{{ replication_password }}"
  register: basebackup_result
  failed_when: basebackup_result.rc != 0

- name: Set application_name for async standby
  lineinfile:
    path: "{{ postgres_data_dir }}/postgresql.auto.conf"
    line: "application_name = 'async_standby_az_c'"
    state: present

- name: Set correct ownership on data directory
  file:
    path: "{{ postgres_data_dir }}"
    owner: postgres
    group: postgres
    recurse: yes

- name: Start PostgreSQL on async standby
  service:
    name: postgresql
    state: started
    enabled: yes

- name: Wait for async standby to be ready
  become_user: postgres
  shell: pg_isready -p {{ postgres_port }}
  register: pg_ready
  retries: 10
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Verify async standby is in recovery mode
  become_user: postgres
  shell: psql -c "SELECT pg_is_in_recovery();"
  register: recovery_check
  failed_when: "'t' not in recovery_check.stdout"
  changed_when: false

- name: Show recovery status
  debug:
    msg: "{{ recovery_check.stdout }}"
