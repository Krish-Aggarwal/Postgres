---
- name: Stop PostgreSQL on sync standby
  service:
    name: "{{ postgres_service }}"
    state: stopped
  ignore_errors: yes

- name: Reset failed systemd unit
  shell: systemctl reset-failed postgresql@{{ postgres_version }}-main || true

- name: Recreate clean data directory
  file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

  - name: Clean data directory
    shell: rm -rf {{ postgres_data_dir }}/*

- name: Run base backup from primary
  become_user: postgres
  shell: |
    pg_basebackup \
      -h {{ hostvars[groups['primary'][0]]['ansible_host'] }} \
      -D {{ postgres_data_dir }} \
      -U {{ replication_user }} \
      -P \
      -R \
      --wal-method=stream \
      --slot=sync_standby_slot
  environment:
    PGPASSWORD: "{{ replication_password }}"
  register: basebackup
  failed_when: basebackup.rc != 0

- name: Ensure standby.signal exists
  file:
    path: "{{ postgres_data_dir }}/standby.signal"
    state: touch
    owner: postgres
    group: postgres

- name: Fix ownership of data directory
  file:
    path: "{{ postgres_data_dir }}"
    owner: postgres
    group: postgres
    recurse: yes

- name: Reset systemd again before start
  shell: systemctl reset-failed postgresql@{{ postgres_version }}-main || true

- name: Start PostgreSQL standby
  service:
    name: "{{ postgres_service }}"
    state: started
    enabled: yes

- name: Wait for PostgreSQL to be ready
  become_user: postgres
  shell: pg_isready -p {{ postgres_port }}
  register: pg_ready
  retries: 20
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Verify standby mode
  become_user: postgres
  shell: psql -tAc "SELECT pg_is_in_recovery();"
  register: recovery
  failed_when: "'t' not in recovery.stdout"
  changed_when: false

- debug:
    msg: "{{ recovery.stdout }}"
